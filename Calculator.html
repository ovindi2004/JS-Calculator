<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="Calculator" content="Calculator">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="asset/normalize.css">
    <link rel="stylesheet" href="CalculatorCss.css">
    <title>Calculator</title>


</head>
<body>
<div class="calculator">
    <div id="display" class="display">0</div>
    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>

        <button class="operator" onclick="appendOperator('%')">%</button>


        <button class="operator" onclick="appendOperator('/')">/</button>

        <button onclick="appendnum('7')">7</button>
        <button onclick="appendnum('8')">8</button>
        <button onclick="appendnum('9')">9</button>
        <button class="operator" onclick="appendOperator('*')">*</button>


        <button onclick="appendnum('4')">4</button>
        <button onclick="appendnum('5')">5</button>
        <button onclick="appendnum('6')">6</button>
        <button class="operator" onclick="appendOperator('-')">-</button>


        <button onclick="appendnum('1')">1</button>
        <button onclick="appendnum('2')">2</button>
        <button onclick="appendnum('3')">3</button>
        <button id="add" class="operator" onclick="appendOperator('+')">+</button>
        <button  onclick="appendOperator('.')">.</button>
        <button onclick="appendnum('0')">0</button>

        <button class="equal" onclick="calculate()">=</button>








    </div>
</div>
<script src="CaculatorJs.js"></script>
<script>
    const  calculator = new Calculator();
    let displayValue = '0';

    function isOperator(token){
        return token === '+'|| token ==='-' || token ==='*' || token ==='/' || token === '%';

    }

    function  runOperation(left,operator,right){
        if (operator === '+') return left + right;
        if(operator === '-') return  left - right;
        if(operator === '*') return left * right;
        if(operator === '/') return left / right;
        if(operator === '%') return left % right;
        throw new Error('Invalid operator');

    }

    function updateDisplay(){
        document.getElementById('display').textContent = displayValue;
    }
    function appendnum(num){
     if(displayValue === '0' && num !== '.'){
         displayValue = num;

     }  else  if (num === '.') {
         const parts = displayValue.split (' ');
        const currentPart = parts[parts.length - 1];

        if(currentPart.includes('.')) return;
        displayValue += num;

     }else {
         displayValue += num;

     }
     updateDisplay();
    }

    function appendOperator(op){
        if(displayValue === '0') return;

        const parts = displayValue.split (' ');
        const lastToken = parts[parts.length - 1];

        if(isOperator(lastToken)){
            parts[parts.length - 1] = op;
            displayValue = parts.join(' ');

        }else {
            displayValue += ` ${op} `;
        }
        updateDisplay();

    }
    function calculate(){
        try {
            const tokens = displayValue.split (' ').filter(Boolean);
            if (tokens.length < 3) return;

            let result = parseFloat(tokens[0]);
            if (Number.isNaN(result)) throw new Error('Invalid input');

            for (let i = 1; i < tokens.length; i += 2) {
                const operator = tokens[i];
                const next = parseFloat(tokens[i + 1]);

                if (!isOperator(operator) || Number.isNaN(next)) {
                    throw new Error('Invalid  Expression');
                }
                result = runOperation(result, operator, next);
            }

            displayValue = result.toString();
            updateDisplay();

        }catch (error){
            displayValue ='Error';
            updateDisplay();
        }
    }

    function clearDisplay(){
        displayValue = '0';
        updateDisplay();
    }
    function clearLast(){
        displayValue = '0';
        updateDisplay();
    }
</script>
</body>
</html>
